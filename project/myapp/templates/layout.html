{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum Gallery</title>

    <link rel="stylesheet" href="{% static 'myapp/bootstrap.min.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-stone-100 flex flex-col min-h-screen">

    <!-- HEADER -->
    <header class="bg-stone-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">
            <h1 class="text-3xl font-bold text-amber-400">
                Museum Gallery
            </h1>

            <nav class="space-x-6 text-lg">
                <a href="/" class="hover:text-amber-300">Home</a>
                <a href="/about" class="hover:text-amber-300">About</a>
                <a href="/contacts" class="hover:text-amber-300">Contacts</a>
            </nav>
        </div>
    </header>

    <!-- CONTENT -->
    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="bg-stone-900 text-white text-center py-5">
        © 2026 Museum Gallery. All rights reserved.
    </footer>

</body>
<script src="{% static 'myapp/js/bootstrap.bundle.min.js' %}"></script>
</html>
