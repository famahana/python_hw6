<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>

    <style>

        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f2f2f2;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        a {
            margin-right: 15px;
            text-decoration: none;
            color: blue;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>{{ title }}</h1>

        <a href="/song_en">English</a>
        <a href="/song_fr">French</a>
        <a href="/song_de">German</a>
        <a href="/song_es">Spanish</a>

        <hr>

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
